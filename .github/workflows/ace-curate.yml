name: ACE Curate

on:
  pull_request:
    paths:
      - "curriculum/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ACE package
        run: |
          cd ace
          pip install -e .

      - name: Run ACE curate on curriculum
        id: curate
        run: |
          set +e
          ace curate --path curriculum/ > curate-report.txt 2>&1
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          cat curate-report.txt
          set -e

      - name: Post curation report as PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT=$(cat curate-report.txt)
          BODY=$(cat <<'DELIM'
          ## ACE Curation Report

          ```
          DELIM
          )
          BODY="${BODY}
          ${REPORT}
          \`\`\`"
          gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY"

      - name: Fail if critical issues found
        if: steps.curate.outputs.exit_code != '0'
        run: exit 1
