name: CLA Assistant

# Asks first-time contributors to sign the Contributor License Agreement (CLA.md)
# by commenting on their PR. Signatures are stored IN THIS REPO at
# signatures/version1/cla.json — no external service is used.
#
# One-time setup required (see docs/contributing.md → "Repository setup"):
#   Add a repo secret named PERSONAL_ACCESS_TOKEN — a classic PAT with `repo`
#   scope (or a fine-grained token with Contents + Pull requests: read/write).
#   The default GITHUB_TOKEN cannot commit the signature file under branch
#   protection, so the action needs this token to record signatures.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: Check / record CLA signature
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/grey8-io/learn-ai-with-grey8/blob/main/CLA.md"
          branch: "main"
          # Maintainers and bots never need to sign.
          allowlist: "grey8dotio-afk,dependabot[bot],*[bot]"
          custom-notsigned-prcomment: >-
            Thank you for your contribution! Before we can merge it, please sign
            our [Contributor License Agreement](https://github.com/grey8-io/learn-ai-with-grey8/blob/main/CLA.md)
            by posting a comment on this PR with exactly:
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA. ✅"
